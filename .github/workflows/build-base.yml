name: Build Images for Base
run-name: Build Images for Base

"on":
  workflow_call:
    inputs:
      base:
        description: Base alias to build (matches bases/<alias>)
        required: true
        type: string
      git_ref:
        description: Git ref to check out
        required: false
        type: string
      aicage_version:
        description: Version to build
        required: true
        type: string
      image:
        description: Image to build (owner/image without tag)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      base:
        description: Base alias to build (matches bases/<alias>)
        required: true
        type: string
      git_ref:
        description: Git ref to check out
        required: false
        type: string
      aicage_version:
        description: Version to build
        required: false
        type: string
        default: test
      image:
        description: Image to build (owner/image without tag)
        required: false
        type: string
        default: ghcr.io/aicage/aicage-image-base

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

jobs:

  build:
    name: "${{ matrix.arch }}: Build and test image"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH_SUFFIX: ${{ matrix.arch }}
      BASE_ALIAS: ${{ inputs.base }}
      ROOT_DIR: ${{ github.workspace }}
      AICAGE_VERSION: ${{ inputs.aicage_version }}
    outputs:
      CREATED: ${{ steps.oci.outputs.created }}
      INDEX_DIGEST_amd64: ${{ steps.out-amd64.outputs.INDEX_DIGEST }}
      INDEX_DIGEST_arm64: ${{ steps.out-arm64.outputs.INDEX_DIGEST }}
      REVISION: ${{ steps.oci.outputs.revision }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Resolve OCI labels
        id: oci
        run: |
          set -euo pipefail
          {
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "revision=$(git rev-parse HEAD)"
            echo "version=${AICAGE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load config file
        id: config
        run: |
          set -euo pipefail
          source scripts/common.sh
          load_config_file
          IMAGE_NAME="${AICAGE_IMAGE_REGISTRY}/${AICAGE_IMAGE_BASE_REPOSITORY}"
          MANIFEST_VERSION_TAG="${IMAGE_NAME}:${BASE_ALIAS}-${AICAGE_VERSION}"
          MANIFEST_LATEST_TAG="${IMAGE_NAME}:${BASE_ALIAS}"
          IMAGE_VERSION_TAG="${MANIFEST_VERSION_TAG}-${ARCH_SUFFIX}"
          IMAGE_LATEST_TAG="${MANIFEST_LATEST_TAG}-${ARCH_SUFFIX}"
          IMAGE_TEST_TAG="${IMAGE_VERSION_TAG}-test"
          {
            echo "IMAGE_NAME=${IMAGE_NAME}"
            echo "IMAGE_VERSION_TAG=${IMAGE_VERSION_TAG}"
            echo "IMAGE_LATEST_TAG=${IMAGE_LATEST_TAG}"
            echo "IMAGE_TEST_TAG=${IMAGE_TEST_TAG}"
            echo "FROM_IMAGE=$(get_base_field "${BASE_ALIAS}" from_image)"
            echo "OS_INSTALLER=$(get_base_build_field "${BASE_ALIAS}" os_installer)"
          } >> "$GITHUB_OUTPUT"
          {
            echo "IMAGE_NAME=${IMAGE_NAME}"
            echo "IMAGE_VERSION_TAG=${IMAGE_VERSION_TAG}"
            echo "IMAGE_LATEST_TAG=${IMAGE_LATEST_TAG}"
            echo "IMAGE_TEST_TAG=${IMAGE_TEST_TAG}"
            echo "FROM_IMAGE=$(get_base_field "${BASE_ALIAS}" from_image)"
            echo "OS_INSTALLER=$(get_base_build_field "${BASE_ALIAS}" os_installer)"
          } >> "$GITHUB_ENV"

      - name: Build test image tag
        id: build_image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            FROM_IMAGE=${{ env.FROM_IMAGE }}
            OS_INSTALLER=${{ env.OS_INSTALLER }}
          tags: |
            ${{ env.IMAGE_TEST_TAG }}
          labels: |
            org.opencontainers.image.description=Base image for aicage (${{ env.BASE_ALIAS }})
            org.opencontainers.image.revision=${{ steps.oci.outputs.revision }}
            org.opencontainers.image.created=${{ steps.oci.outputs.created }}
            org.opencontainers.image.version=${{ steps.oci.outputs.version }}

      - name: "Test: Pull base image for local tests"
        run: |
          set -euo pipefail
          docker pull "${IMAGE_NAME}@${{ steps.build_image.outputs.digest }}"

      - name: "Test: Verify OCI labels on base image"
        run: |
          set -euo pipefail
          expected_description="Base image for aicage (${{ env.BASE_ALIAS }})"
          expected_revision="${{ steps.oci.outputs.revision }}"
          expected_created="${{ steps.oci.outputs.created }}"
          expected_version="${{ steps.oci.outputs.version }}"
          docker image inspect "${IMAGE_NAME}@${{ steps.build_image.outputs.digest }}" \
            | jq -e \
              --arg expected_description "$expected_description" \
              --arg expected_revision "$expected_revision" \
              --arg expected_created "$expected_created" \
              --arg expected_version "$expected_version" '
              .[0].Config.Labels["org.opencontainers.image.description"] == $expected_description
              and .[0].Config.Labels["org.opencontainers.image.revision"] == $expected_revision
              and .[0].Config.Labels["org.opencontainers.image.created"] == $expected_created
              and .[0].Config.Labels["org.opencontainers.image.version"] == $expected_version
            ' >/dev/null

      - name: "Test: Setup BATS testing framework"
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Test: Run smoke suites on base image"
        run: |
          set -euo pipefail
          scripts/test.sh \
            --image "${IMAGE_NAME}@${{ steps.build_image.outputs.digest }}" \
            --base "${BASE_ALIAS}"

      - name: Export digest (amd64)
        id: out-amd64
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          (
            echo "INDEX_DIGEST=${{ steps.build_image.outputs.digest }}"
          ) | tee /dev/stderr >> "$GITHUB_OUTPUT"

      - name: Export digest (arm64)
        id: out-arm64
        if: matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          (
            echo "INDEX_DIGEST=${{ steps.build_image.outputs.digest }}"
          ) | tee /dev/stderr >> "$GITHUB_OUTPUT"

  multiarch:
    name: Run multi-arch sign/provenance/publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Use multi-arch publish action
        id: publish
        uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260  # 0.2.1
        with:
          image_ref: ${{ inputs.image }}
          tags: |
            ${{ inputs.base }}-${{ inputs.aicage_version }}
            ${{ inputs.base }}
          platform_digests: |
            linux/amd64=${{ needs.build.outputs.INDEX_DIGEST_amd64 }}
            linux/arm64=${{ needs.build.outputs.INDEX_DIGEST_arm64 }}
          annotations: |
            org.opencontainers.image.title=aicage-image-base
            org.opencontainers.image.description=Base image for aicage (${{ inputs.base }})
            org.opencontainers.image.source=https://github.com/aicage/aicage-image-base
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ needs.build.outputs.REVISION }}
            org.opencontainers.image.created=${{ needs.build.outputs.CREATED }}
            org.opencontainers.image.version=${{ inputs.aicage_version }}

      - name: Verify OCI annotations on published manifest
        run: |
          set -euo pipefail
          expected_description="Base image for aicage (${{ inputs.base }})"
          expected_revision="${{ needs.build.outputs.REVISION }}"
          expected_created="${{ needs.build.outputs.CREATED }}"
          expected_version="${{ inputs.aicage_version }}"
          docker buildx imagetools inspect \
            --raw "${{ inputs.image }}@${{ steps.publish.outputs.manifest_digest }}" \
            | jq -e \
              --arg expected_description "$expected_description" \
              --arg expected_revision "$expected_revision" \
              --arg expected_created "$expected_created" \
              --arg expected_version "$expected_version" '
              .annotations["org.opencontainers.image.title"] == "aicage-image-base"
              and .annotations["org.opencontainers.image.description"] == $expected_description
              and .annotations["org.opencontainers.image.source"]
                == "https://github.com/aicage/aicage-image-base"
              and .annotations["org.opencontainers.image.licenses"] == "Apache-2.0"
              and .annotations["org.opencontainers.image.revision"] == $expected_revision
              and .annotations["org.opencontainers.image.created"] == $expected_created
              and .annotations["org.opencontainers.image.version"] == $expected_version
            ' >/dev/null
