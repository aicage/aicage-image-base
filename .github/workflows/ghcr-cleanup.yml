name: GHCR Cleanup

"on":
  # Weekly on Wednesday at 03:23 UTC
  schedule:
    - cron: "23 3 * * 3"
  workflow_dispatch:
    inputs:
      older-than-days:
        description: "Retention window in days for cleanup"
        type: number
        default: 30
      dry-run:
        description: "Run in dry-run mode (recommended first)"
        type: boolean
        default: true
      log-level:
        description: "Action log level"
        type: choice
        options:
          - info
          - debug
          - warn
          - error
        default: info

permissions:
  contents: read
  packages: write

jobs:
  prepare-retention-regex:
    name: Prepare retention regex
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.config.outputs.package_name }}
      exclude_tags_regex: ${{ steps.regex.outputs.exclude_tags_regex }}
      release_list: ${{ steps.regex.outputs.release_list }}
      base_list: ${{ steps.regex.outputs.base_list }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Export config
        id: config
        shell: bash
        env:
          ROOT_DIR: ${{ github.workspace }}
        run: |
          set -euo pipefail
          source scripts/common.sh
          load_config_file
          {
            echo "package_name=${AICAGE_IMAGE_BASE_REPOSITORY#*/}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build base/release exclude-tags-regex
        id: regex
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mapfile -t BASES < <(find bases -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          if (( ${#BASES[@]} == 0 )); then
            echo "No base folders found under ./bases" >&2
            exit 1
          fi

          RELEASES_JSON="$(
            curl \
              -fsSL \
              --retry 8 \
              --retry-all-errors \
              --retry-delay 2 \
              --max-time 300 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"
          )"

          mapfile -t RELEASES < <(
            printf '%s' "${RELEASES_JSON}" \
              | jq -r '.[] | select(.draft | not) | .tag_name' \
              | sort -V -r
          )

          if (( ${#RELEASES[@]} == 0 )); then
            echo "No release tags found. This must be non-empty." >&2
            exit 1
          fi

          ESCAPED_BASES=()
          for base in "${BASES[@]}"; do
            escaped_base="$(printf '%s' "${base}" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g')"
            ESCAPED_BASES+=("${escaped_base}")
          done

          ESCAPED_RELEASES=()
          for rel in "${RELEASES[@]}"; do
            escaped_rel="$(printf '%s' "${rel}" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g')"
            ESCAPED_RELEASES+=("${escaped_rel}")
          done

          BASE_LIST="$(IFS='|'; echo "${ESCAPED_BASES[*]}")"
          RELEASE_LIST="$(IFS='|'; echo "${ESCAPED_RELEASES[*]}")"
          EXCLUDE_TAGS_REGEX="^(${BASE_LIST})(-(${RELEASE_LIST}))?(-amd64|-arm64)?$"

          {
            echo "base_list=${BASE_LIST}"
            echo "release_list=${RELEASE_LIST}"
            echo "exclude_tags_regex=${EXCLUDE_TAGS_REGEX}"
          } | tee /dev/stderr >> "${GITHUB_OUTPUT}"

  ghcr-cleanup:
    name: GHCR cleanup
    needs: prepare-retention-regex
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old images
        uses: ghcr-manager/ghcr-cleanup-manager@e9871d03c6e48d4bbb24a8132872218a73288a4a  # v1.1.6
        with:
          command: cleanup
          token: ${{ secrets.GHCR_CLEANUP_PAT != '' && secrets.GHCR_CLEANUP_PAT || github.token }}
          owner: ${{ github.repository_owner }}
          package: ${{ needs.prepare-retention-regex.outputs.package_name }}
          upload-artifacts: true
          use-regex: true
          delete-tags: '.*'
          exclude-tags: ${{ needs.prepare-retention-regex.outputs.exclude_tags_regex }}
          older-than: ${{ github.event_name == 'workflow_dispatch' && inputs.older-than-days || 30 }} days
          delete-untagged: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
          log-level: ${{ github.event_name == 'workflow_dispatch' && inputs.log-level || 'info' }}
