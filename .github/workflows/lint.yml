name: Lint and Validate
run-name: Lint and validate (${{ github.ref_name }})

"on":
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    name: Lint for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9467f3db8f5f3c942629468981c4a2a67d0caa64  # v2.6.1
        with:
          include-first-party: 'true'
          write-job-summary: 'on-failure-only'

      - name: "Test: Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: "Test: Install shellcheck"
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Test: Remove Python yq and keep using Go yq"
        run: |
          set -euo pipefail
          python -m pip uninstall -y yq

      - name: "Test: Install lint deps"
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: "Test: Run scripts/lint.sh"
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          scripts/lint.sh
