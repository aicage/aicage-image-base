name: Lint and Validate
run-name: Lint and validate (${{ github.ref_name }})

"on":
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    name: Lint for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9f5dad6bb6148bd29ff0d874de6a8cc70af08fa9  # v2.6.2
        with:
          include-first-party: 'true'
          write-job-summary: 'on-failure-only'

      - name: "Test: Lint Dockerfile"
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0

      - name: "Test: Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.x"

      - name: "Test: Install shellcheck"
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Test: Remove Python yq and keep using Go yq"
        run: |
          set -euo pipefail
          python -m pip uninstall -y yq

      - name: "Test: Install lint deps"
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: "Test: Run scripts/lint.sh"
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          scripts/lint.sh
