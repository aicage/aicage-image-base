name: Release
run-name: Release (${{ github.ref_name }})

"on":
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

jobs:

  verify-tagged-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify tagged commit is on origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, but that commit is not on origin/main." >&2
            echo "Push the commit to origin/main before pushing the release tag." >&2
            exit 1
          fi

  build-images:
    needs: verify-tagged-commit
    uses: ./.github/workflows/build-all-images-worker.yml

  release:
    runs-on: ubuntu-latest
    needs: [build-images, verify-tagged-commit]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Release: Package release artifacts"
        run: |
          set -euo pipefail
          ROOT_DIR="${GITHUB_WORKSPACE}"
          export ROOT_DIR
          mkdir -p dist
          source scripts/common.sh
          load_config_file

          artifact_dir="$(mktemp -d)"
          mkdir -p "${artifact_dir}/bases" "${artifact_dir}/scripts"
          # add filtered bases
          while IFS= read -r base_alias; do
            cp -a "bases/${base_alias}" "${artifact_dir}/bases/"
          done < <(list_configured_bases)
          # add tests
          cp -a tests "${artifact_dir}/"
          # add scripts
          cp -a scripts/os-installers scripts/entrypoint.sh "${artifact_dir}/scripts/"

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          tar -czf dist/"${REPO_NAME}".tar.gz \
            -C "${artifact_dir}" \
              bases \
              tests \
              scripts
          tar -czf dist/"${REPO_NAME}"-smoke-tests.tar.gz \
            tests/bases/smoke
          rm -rf "${artifact_dir}"

      - name: "Release: Create SHA256SUMS"
        run: |
          set -euo pipefail
          cd dist
          LC_ALL=C find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 | \
            sort -z | \
            xargs -0 sha256sum \
            > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: "Release: Keyless-sign SHA256SUMS"
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --bundle SHA256SUMS.sigstore.json \
            SHA256SUMS

      - name: "Release: Create GitHub release"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
