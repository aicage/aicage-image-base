name: Release
run-name: Release (${{ github.ref_name }})

"on":
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

jobs:

  verify-tagged-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify tagged commit is on origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, but that commit is not on origin/main." >&2
            echo "Push the commit to origin/main before pushing the release tag." >&2
            exit 1
          fi

  build-images:
    needs: verify-tagged-commit
    uses: ./.github/workflows/build-all-images-worker.yml

  release:
    runs-on: ubuntu-latest
    needs: [build-images, verify-tagged-commit]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Release: Package release artifacts"
        run: |
          set -euo pipefail
          mkdir -p dist
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          tar -czf dist/"${REPO_NAME}".tar.gz \
            bases \
            tests \
            -C scripts \
              os-installers \
              entrypoint.sh
          tar -czf dist/"${REPO_NAME}"-smoke-tests.tar.gz \
            tests/bases/smoke

      - name: "Release: Create SHA256SUMS"
        run: |
          set -euo pipefail
          cd dist
          LC_ALL=C find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 | \
            sort -z | \
            xargs -0 sha256sum \
            > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: "Release: Keyless-sign SHA256SUMS"
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --bundle SHA256SUMS.sigstore.json \
            SHA256SUMS

      - name: "Release: Create GitHub release"
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
